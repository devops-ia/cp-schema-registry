name: Build and Push Docker Image

permissions: {}

env:
  DOCKERHUB_USER: devopsiaci
  DOCKERHUB_REPO: cp-schema-registry
  GHCR_REGISTRY: ghcr.io
  GHCR_REPO: ${{ github.repository }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile

jobs:
  release:
    name: Create tag release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read tags from Dockerfile
        id: current_tag
        run: |
          # cp_schema_registry_release
          cp_schema_registry_current_tag=$(grep "ARG CP_SCHEMA_REGISTRY_VERSION" Dockerfile | cut -d '=' -f 2)
          echo "cp_schema_registry_current_tag=$cp_schema_registry_current_tag" >> $GITHUB_OUTPUT

          # aws_msk_iam_auth_release
          aws_msk_iam_auth_current_tag=$(grep "ARG AWS_MSK_IAM_AUTH_VERSION" Dockerfile | cut -d '=' -f 2)
          echo "aws_msk_iam_auth_current_tag=$aws_msk_iam_auth_current_tag" >> $GITHUB_OUTPUT

          # complete release
          echo "complete_release=${cp_schema_registry_current_tag}-msk-iam-auth${aws_msk_iam_auth_current_tag}" >> $GITHUB_OUTPUT

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.DOCKERHUB_USER }}/${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          labels: |
            org.opencontainers.image.maintainer=ialejandro
            org.opencontainers.image.title=cp-schema-registry
            org.opencontainers.image.description=cp-schema-registry with MSK IAM auth library to authenticate with AWS MSK
            org.opencontainers.image.vendor=DevOps IA
          tags: |
            type=raw,value=${{ steps.current_tag.outputs.complete_release }}
            type=sha,enable=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: "[DOCKERHUB] Log in to Docker Hub"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: "[GHCR] Log in to the Container registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push Docker image"
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: "Update README.md default version"
        run: |
          # replace default version
          sed -i "s/\* cp-schema-registry: .*/* cp-schema-registry: \`${{ steps.current_tag.outputs.cp_schema_registry_current_tag }}\`/" README.md
          sed -i "s/\* aws-msk-iam-auth: .*/* aws-msk-iam-auth: \`${{ steps.current_tag.outputs.aws_msk_iam_auth_current_tag }}\`/" README.md

          # push changes
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git commit -m "chore: update README.md [skip ci]" || true
          git push -f origin HEAD:main

      - name: "[DOCKERHUB] Update Docker registry description"
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ env.DOCKERHUB_USER }}/${{ env.DOCKERHUB_REPO }}

      - name: "[GHCR] Generate artifact"
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
